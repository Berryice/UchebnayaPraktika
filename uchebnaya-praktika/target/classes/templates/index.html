<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>список товаров</title>
    <link rel="icon" href="/Комфорт.ico" type="image/x-icon">
</head>

<body>

<img src="/Комфорт.png" style="height:200px; width:auto">

<h1>список продуктов</h1>

<div th:if="${successMessage}" style="background-color: #4CAF50; color: white; padding: 10px; margin: 10px 0; border-radius: 5px; text-align: center;">
    <span th:text="${successMessage}">Продукт успешно сохранен</span>
</div>
<div th:if="${errorMessage}" style="background-color: #f44336; color: white; padding: 10px; margin: 10px 0; border-radius: 5px; text-align: center;">
    <span th:text="${errorMessage}">Ошибка</span>
</div>

<button onclick="window.location.assign('/add_product')" style="color:#355CBD">
    добавить товар
</button>

<div class="products">

<div th:each="product : ${products}" 
     class="product_div" 
     style="position:relative;margin:2%; border:2px solid black; background-color:#D2DFFF;">

    <p style="font-family:Candara; margin-left:5%">
        тип: <span th:text="${product.type.name}"></span> |
        название: <span th:text="${product.name}"></span>
    </p>

    <p style="font-family:Candara; margin-left:5%">
        артикул: <span th:text="${product.article}"></span>
    </p>

    <p style="font-family:Candara; margin-left:5%">
        стоимость: <span th:text="${product.price}"></span>
    </p>

    <p style="font-family:Candara; margin-left:5%">
        материал: <span th:text="${product.material.name}"></span>
    </p>

    <a th:href="@{'/update_product/' + ${product.id}}" 
    style="display:inline-block; margin-left:5%; margin-top:10px; padding:5px 10px; 
            background-color:#355CBD; color:white; text-decoration:none; border-radius:5px;">
        изменить продукт
    </a>
    <a th:href="@{'/workshops/' + ${product.id}}" 
    style="display:inline-block; margin-left:10px; margin-top:10px; padding:5px 10px; 
            background-color:#355CBD; color:white; text-decoration:none; border-radius:5px;">
        цеха
    </a>
    <p style="font-family:Candara; position:absolute; right:0; top:0; margin-right:5%">
        часов: <span th:text="${product.totalTime}"></span>
    </p>

</div>

</div>

</body>
</html>
